version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: vh-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: volunteer_helper
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vh-network-dev

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: vh-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    networks:
      - vh-network-dev

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  vh-network-dev:
    driver: bridge
